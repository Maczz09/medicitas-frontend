server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_comp_level 5;
  gzip_min_length 1024;
  gzip_types text/css application/javascript application/json image/svg+xml;

  # Assets con hash → caché agresivo
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # SSE (Server-Sent Events) — conexión persistente para tiempo real.
  # DEBE ir separada de /api/ genérico: con buffering activado (el default de
  # nginx) los eventos quedan atrapados en el buffer y nunca llegan al
  # navegador en tiempo real, y proxy_read_timeout 30s corta la conexión
  # persistente aunque el backend mande pings cada 15s.
  location /api/v2/realtime/ {
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $backend_host "backend";
    proxy_pass http://$backend_host:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $backend_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Authorization $http_authorization;
    proxy_set_header Connection '';
    proxy_buffering off;
    proxy_cache off;
    chunked_transfer_encoding off;
    proxy_read_timeout 1h;
    proxy_connect_timeout 5s;
  }

  # API → backend directo por la red Docker compartida (medicitas_shared_net).
  # No pasa por el puerto 80 del host: evita colisiones con XAMPP/Apache u otro
  # servicio que escuche en :80 de Windows.
  location /api/ {
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $backend_host "backend";
    proxy_pass http://$backend_host:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $backend_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Authorization $http_authorization;
    proxy_read_timeout 30s;
    proxy_connect_timeout 5s;
  }

  # SPA fallback (React Router). index.html nunca se cachea para evitar
  # bundles obsoletos tras un rebuild (causa de logins/errores fantasma).
  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }
}
