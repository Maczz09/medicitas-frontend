server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_comp_level 5;
  gzip_min_length 1024;
  gzip_types text/css application/javascript application/json image/svg+xml;

  # Assets con hash → caché agresivo
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # API → Nginx del backend publicado en el puerto 80 del host.
  # host.docker.internal resuelve al host en Docker Desktop (Windows/Mac).
  # En Linux añadir extra_hosts: ["host.docker.internal:host-gateway"] al compose.
  location /api/ {
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $backend_host "host.docker.internal";
    proxy_pass http://$backend_host:80;
    proxy_http_version 1.1;
    proxy_set_header Host $backend_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Authorization $http_authorization;
    proxy_read_timeout 30s;
    proxy_connect_timeout 5s;
  }

  # SPA fallback (React Router). index.html nunca se cachea para evitar
  # bundles obsoletos tras un rebuild (causa de logins/errores fantasma).
  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }
}
