services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: medicitas_frontend
    restart: unless-stopped
    ports:
      - "8081:80"
    # Conecta a la red compartida del stack backend para proxear /api
    # directamente al contenedor `backend:3000`, sin depender del puerto 80
    # del host (evita colisiones con XAMPP/Apache en Windows).
    networks:
      - medicitas_shared_net

networks:
  medicitas_shared_net:
    external: true
