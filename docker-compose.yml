services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: medicitas_frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    # host.docker.internal se resuelve automáticamente en Docker Desktop (Windows/Mac).
    # En Linux este extra_hosts lo mapea al gateway del host.
    extra_hosts:
      - "host.docker.internal:host-gateway"
